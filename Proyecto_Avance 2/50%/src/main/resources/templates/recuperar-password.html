<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Recuperar Contraseña — VehiculosCR.com</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <link rel="stylesheet" th:href="@{/css/form.css}"/>
</head>
<body>

    <div class="phone-wrapper">

        <!-- ── HERO igual al index ── -->
        <div class="hero-section">
            <div class="car-logo-area">
                <svg class="car-svg" viewBox="0 0 320 90" xmlns="http://www.w3.org/2000/svg">
                    <path d="M30 62 Q50 62 60 52 Q80 30 130 26 Q175 22 210 26 Q250 30 265 48 Q275 56 290 60 L295 62 Q300 64 295 68 L290 68 Q288 76 278 76 Q268 76 266 68 L90 68 Q88 76 78 76 Q68 76 66 68 L30 68 Q22 66 22 62 Z"
                          fill="none" stroke="white" stroke-width="2.5"/>
                    <path d="M100 52 Q115 32 160 26 Q205 22 230 50"
                          fill="none" stroke="white" stroke-width="2.5"/>
                    <path d="M166 28 Q195 26 225 48 L200 50 Q185 36 166 34 Z"
                          fill="rgba(255,255,255,0.18)" stroke="white" stroke-width="1.2"/>
                    <path d="M105 50 Q115 34 162 30 L162 34 Q120 36 110 50 Z"
                          fill="rgba(255,255,255,0.18)" stroke="white" stroke-width="1.2"/>
                    <circle cx="78"  cy="68" r="10" fill="none" stroke="white" stroke-width="2.5"/>
                    <circle cx="78"  cy="68" r="4"  fill="white"/>
                    <circle cx="275" cy="68" r="10" fill="none" stroke="white" stroke-width="2.5"/>
                    <circle cx="275" cy="68" r="4"  fill="white"/>
                    <path d="M288 55 L298 52 L300 58 L290 60 Z" fill="white" opacity="0.9"/>
                    <line x1="30"  y1="64" x2="10"  y2="62" stroke="#e8002d" stroke-width="2"/>
                    <line x1="300" y1="64" x2="318" y2="60" stroke="#e8002d" stroke-width="2"/>
                </svg>
            </div>
            <div class="brand-name">
                <span class="brand-white">VEHICULOS</span><br/>
                <span class="brand-red">CR</span><span class="brand-white">.COM</span>
            </div>
            <div class="slogan"><em>"Velocidad, estilo y actitud."</em></div>
        </div>

        <!-- ── FORMULARIO DE RECUPERACIÓN ── -->
        <div class="recover-section">

            <form method="get" action="/login">
                <div class="form-group">
                    <label for="nueva-password">Ingresa una nueva contraseña</label>
                    <input type="password" id="nueva-password" name="nuevaPassword"
                           placeholder="" required/>
                </div>
                <div class="form-group">
                    <label for="repite-password">Repite la contraseña</label>
                    <input type="password" id="repite-password" name="repitePassword"
                           placeholder="" required/>
                </div>

                <div class="recover-actions">
                    <a th:href="@{/login}" class="btn-dark-blue">
                        <em>Volver a inicio de sesión</em>
                    </a>
                </div>
            </form>

            <!-- Flecha de regreso ‹‹ -->
            <div class="back-arrow-row">
                <a th:href="@{/login}" class="back-arrow">&#171;</a>
            </div>

        </div>
    </div>

</body>
</html>
