<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar Sesión — VehiculosCR.com</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <link rel="stylesheet" th:href="@{/css/form.css}"/>
</head>
<body>

    <div class="phone-wrapper">
        <!-- Mini encabezado -->
        <div class="form-header">
            <a th:href="@{/}" class="back-link">&#8592; Volver</a>
            <div class="form-brand">
                <span class="brand-white">VEHICULOS</span><span class="brand-red">CR</span><span class="brand-white">.COM</span>
            </div>
        </div>

        <div class="form-section">
            <h2 class="form-title">Iniciar Sesión</h2>

            <form method="get" action="/marcas">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required/>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required/>
                </div>
                <button type="submit" class="btn-main btn-form">Inicia Sesión</button>
            </form>

            <p class="form-footer-text">
                ¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a>
            </p>
            <p class="form-footer-text" style="margin-top:10px;">
                <a th:href="@{/recuperar-password}">¿Olvidaste tu contraseña?</a>
            </p>
        </div>
    </div>

</body>
</html>
